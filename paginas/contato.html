<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/style.css">
    <title>Contato</title>
</head>
<body>
    
    <h2 id="h2contato">Contate-me:</h2>
    <form action="https://api.staticforms.dev/submit" method="POST">
        <input type="hidden" name="apiKey" value="#"/>

        <div id="ctt_nmem">
    <label for="nome_ctt" name="nome">Nome:</label>
    <input type="text" name="nome" id="nome_ctt">



    <label for="email_ctt">E-mail:</label>
    <input type="email" name="email" id="email_ctt">
</div>

<div id="ctt_msg">
    <label for="mensagem_ctt">Mensagem:</label>
    <textarea name="mensagem" id="mensagem_ctt" cols="30" rows="5"></textarea>

    <div id="botaoenviar">
    <input type="submit" value="Enviar">
    </div>
    
</div>



</form>
</body>
</html>
