<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>

    <h2>Contate-me:</h2>
    <form action="">
    <label for="nome_ctt" name="nome">Nome:</label>
    <input type="text" name="nome" id="nome_ctt">

    <label for="email_ctt">E-mail:</label>
    <input type="email" name="email" id="email_ctt">

    <label for="mensagem_ctt">Mensagem:</label>
    <textarea name="mensagem" id="mensagem_ctt" cols="30" rows="10"></textarea>

    <input type="button" value="Enviar">
</form>
</body>
</html>
